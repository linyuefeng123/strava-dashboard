<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="3600">
<title>{% block title %}仪表盘{% endblock %}</title>
<style>
/* ===== Kindle PW2: 758x1024, 16-gray, table layout ===== */
html, body {
  margin: 0; padding: 0;
  width: 758px; height: 1024px;
  background: #FFFFFF; color: #000000;
  font-family: "Georgia", "Times New Roman", serif;
  font-size: 12pt; line-height: 1.3;
  -webkit-text-size-adjust: none;
}

.page { width: 758px; min-height: 1024px; padding: 4px 6px 44px 6px; box-sizing: border-box; }
.box { border: 1px solid #888888; margin-bottom: 3px; padding: 3px 5px; }

/* Header */
.header-table { width: 100%; border-collapse: collapse; border: 1px solid #888888; margin-bottom: 3px; }
.header-table td { padding: 3px 6px; font-size: 13pt; font-weight: bold; }
.header-left { text-align: left; }
.header-right { text-align: right; font-weight: normal; font-size: 11pt; color: #333333; }

/* Section titles */
.section-title { font-size: 11pt; font-weight: bold; margin: 0 0 2px 0; padding: 0; letter-spacing: 0.5px; color: #555555; }

/* Progress bar */
.bar-wrap { border-collapse: collapse; height: 14px; width: 100%; }
.bar-wrap td { padding: 0; height: 14px; font-size: 1px; line-height: 1px; }
.bar-fill { background: #444444; }
.bar-empty { background: #CCCCCC; }

/* Todo table */
.todo-table { width: 100%; border-collapse: collapse; }
.todo-table td { padding: 2px 3px; font-size: 12pt; vertical-align: middle; }
.todo-check { width: 26px; text-align: center; font-weight: bold; }
.todo-done { color: #888888; text-decoration: line-through; }
.todo-summary { font-size: 11pt; padding: 2px 3px; border-top: 1px solid #CCCCCC; color: #333333; }

/* Meeting table */
.meeting-table { width: 100%; border-collapse: collapse; }
.meeting-table td { padding: 2px 3px; font-size: 12pt; vertical-align: middle; }
.meeting-time { width: 60px; font-weight: bold; color: #333333; }
.meeting-title { color: #333333; }
.meeting-empty { color: #888888; font-style: italic; text-align: center; padding: 6px; font-size: 11pt; }

/* Weather */
.weather-table { width: 100%; border-collapse: collapse; }
.weather-table td { padding: 2px 4px; font-size: 12pt; vertical-align: middle; }
.weather-icon { width: 28px; text-align: center; font-weight: bold; font-size: 14pt; }
.weather-temp { font-weight: bold; font-size: 22pt; }
.weather-desc { font-size: 13pt; }
.forecast-table { width: 100%; border-collapse: collapse; }
.forecast-table td { padding: 2px 4px; font-size: 11pt; vertical-align: middle; }
.forecast-day { width: 52px; color: #333333; font-weight: bold; }
.forecast-icon { width: 24px; text-align: center; font-weight: bold; font-size: 12pt; }
.forecast-range { text-align: right; color: #333333; white-space: nowrap; }
.rain-alert { background: #DDDDDD; padding: 3px 5px; margin-top: 2px; font-size: 11pt; color: #333333; }

/* Upcoming events */
.upcoming-table { width: 100%; border-collapse: collapse; }
.upcoming-table td { padding: 2px 4px; font-size: 12pt; vertical-align: middle; }
.event-bullet { width: 16px; text-align: center; font-size: 13pt; }
.event-name { font-weight: bold; }
.event-days { text-align: right; color: #333333; white-space: nowrap; }

/* Quote */
.quote-text { font-style: italic; color: #333333; font-size: 12pt; padding: 3px 0; }
.quote-from { text-align: right; color: #888888; font-size: 10pt; }

/* Data table */
.data-table { width: 100%; border-collapse: collapse; }
.data-table td { padding: 2px 3px; font-size: 12pt; vertical-align: middle; }

/* Nav bar */
.nav-bar { position: absolute; bottom: 0; left: 0; width: 758px; border-top: 1px solid #888888; background: #FFFFFF; text-align: center; padding: 5px 0; }
.nav-item { display: inline-block; width: 240px; font-size: 12pt; color: #333333; text-decoration: none; padding: 3px 0; }
.nav-item.active { font-weight: bold; text-decoration: underline; color: #000000; }
</style>
</head>
<body>
<div class="page">

<table class="header-table">
  <tr>
    <td class="header-left">{% block header %}{% endblock %}</td>
    <td class="header-right">{{ date }}</td>
  </tr>
</table>

{% block content %}{% endblock %}

</div>

<div class="nav-bar">
  <a href="work.html" class="nav-item{% if page == 'work' %} active{% endif %}">工作</a>
  <a href="life.html" class="nav-item{% if page == 'life' %} active{% endif %}">生活</a>
  <a href="index.html" class="nav-item{% if page == 'sports' %} active{% endif %}">运动</a>
</div>

</body>
</html>
