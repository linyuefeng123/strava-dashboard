<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="3600">
<title>待办专注</title>
<style>
/* ===== E-ink Base: 758x1024, 16-gray, table layout ===== */
html, body {
  margin: 0;
  padding: 0;
  width: 758px;
  height: 1024px;
  background: #FFFFFF;
  color: #000000;
  font-family: "Georgia", "Times New Roman", serif;
  font-size: 10pt;
  line-height: 1.25;
  -webkit-text-size-adjust: none;
}

/* --- Layout container --- */
.page {
  width: 758px;
  height: 1024px;
  padding: 4px 6px;
  box-sizing: border-box;
}

/* --- Section box --- */
.box {
  border: 1px solid #888888;
  margin-bottom: 3px;
  padding: 3px 5px;
}

/* --- Header --- */
.header-table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid #888888;
  margin-bottom: 3px;
}
.header-table td {
  padding: 3px 6px;
  font-size: 12pt;
  font-weight: bold;
}
.header-left {
  text-align: left;
}
.header-right {
  text-align: right;
  font-weight: normal;
  font-size: 10pt;
  color: #333333;
}

/* --- Section titles --- */
.section-title {
  font-size: 10pt;
  font-weight: bold;
  margin: 0 0 2px 0;
  padding: 0;
  letter-spacing: 0.5px;
}

/* --- Two-column layout --- */
.split-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 3px;
}
.split-table td {
  vertical-align: top;
  padding: 0;
}
.split-left {
  width: 50%;
  padding-right: 2px;
}
.split-right {
  width: 50%;
  padding-left: 2px;
}

/* --- Progress bar (table-based) --- */
.bar-table {
  border-collapse: collapse;
  height: 8px;
}
.bar-table td {
  padding: 0;
  height: 8px;
  font-size: 1px;
  line-height: 1px;
}
.bar-fill {
  background: #444444;
}
.bar-empty {
  background: #CCCCCC;
}

/* --- Generic data table --- */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table td {
  padding: 1px 3px;
  font-size: 9pt;
  vertical-align: middle;
}

/* --- Todo list --- */
.todo-table {
  width: 100%;
  border-collapse: collapse;
}
.todo-table td {
  padding: 1px 3px;
  font-size: 9pt;
  vertical-align: middle;
}
.todo-check {
  width: 20px;
  text-align: center;
  font-weight: bold;
}
.todo-done {
  color: #888888;
  text-decoration: line-through;
}
.todo-summary {
  font-size: 9pt;
  padding: 2px 3px;
  border-top: 1px solid #CCCCCC;
  color: #333333;
}

/* --- Training plan --- */
.training-table {
  width: 100%;
  border-collapse: collapse;
}
.training-table td {
  padding: 1px 3px;
  font-size: 9pt;
}
.train-day {
  width: 28px;
  font-weight: bold;
}
.train-desc {
  color: #333333;
}
.train-rest {
  color: #888888;
  font-style: italic;
}
.train-today {
  font-weight: bold;
  border: 1px solid #444444;
  padding: 2px 4px;
}

/* --- Weather --- */
.weather-table {
  width: 100%;
  border-collapse: collapse;
}
.weather-table td {
  padding: 1px 3px;
  font-size: 9pt;
  vertical-align: middle;
}
.weather-icon {
  width: 20px;
  text-align: center;
  font-weight: bold;
  font-size: 10pt;
}
.weather-temp {
  font-weight: bold;
  font-size: 14pt;
}
.weather-desc {
  color: #333333;
}

/* --- Forecast --- */
.forecast-table {
  width: 100%;
  border-collapse: collapse;
}
.forecast-table td {
  padding: 1px 3px;
  font-size: 9pt;
  vertical-align: middle;
}
.forecast-day {
  width: 48px;
  color: #333333;
}
.forecast-icon {
  width: 20px;
  text-align: center;
  font-weight: bold;
}
.forecast-range {
  text-align: right;
  color: #333333;
  white-space: nowrap;
}

/* --- Countdown --- */
.countdown-box {
  text-align: center;
  padding: 6px;
  border: 2px solid #444444;
  margin: 3px 0;
}
.countdown-days {
  font-size: 24pt;
  font-weight: bold;
  line-height: 1.2;
}
.countdown-label {
  font-size: 10pt;
  color: #333333;
}

/* --- Zones reference --- */
.zone-table {
  width: 100%;
  border-collapse: collapse;
}
.zone-table td {
  padding: 1px 3px;
  font-size: 8.5pt;
  vertical-align: middle;
}
.zone-label {
  font-weight: bold;
  width: 50px;
}
.zone-value {
  color: #333333;
  white-space: nowrap;
}

/* --- Quote --- */
.quote-text {
  font-style: italic;
  color: #333333;
  font-size: 9pt;
  padding: 2px 0;
}
.quote-from {
  text-align: right;
  color: #888888;
  font-size: 8pt;
}

/* --- Goals progress --- */
.goals-table {
  width: 100%;
  border-collapse: collapse;
}
.goals-table td {
  padding: 1px 3px;
  font-size: 9.5pt;
  vertical-align: middle;
}
.goal-icon {
  width: 24px;
  text-align: center;
  font-weight: bold;
}
.goal-sport {
  width: 36px;
  font-weight: bold;
}
.goal-values {
  width: 110px;
  text-align: right;
  color: #333333;
  font-size: 9pt;
  white-space: nowrap;
}
.goal-pct {
  width: 30px;
  text-align: right;
  font-size: 9pt;
  font-weight: bold;
}

/* --- Upcoming events --- */
.upcoming-table {
  width: 100%;
  border-collapse: collapse;
}
.upcoming-table td {
  padding: 1px 3px;
  font-size: 9pt;
}
.event-bullet {
  width: 12px;
  text-align: center;
}
.event-name {
  font-weight: bold;
}
.event-days {
  text-align: right;
  color: #333333;
  white-space: nowrap;
}

/* --- Utility --- */
.separator {
  border-top: 1px solid #CCCCCC;
  margin: 1px 0;
}

/* --- Bottom navigation bar --- */
.nav-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 758px;
  border-top: 1px solid #888888;
  background: #FFFFFF;
  text-align: center;
  padding: 4px 0;
}
.nav-item {
  display: inline-block;
  width: 180px;
  font-size: 10pt;
  color: #333333;
  text-decoration: none;
  padding: 2px 0;
}
.nav-item.active {
  font-weight: bold;
  text-decoration: underline;
  color: #000000;
}
</style>
</head>
